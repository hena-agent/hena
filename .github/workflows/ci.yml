name: ci

# Lint, typecheck, build, coverage, and knip. Exposed as a reusable workflow so
# review.yml can run it as a required gate before the PR reviewers start, and run
# directly on pushes to main.
on:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Pinned to a SHA to match this repo's other workflows. bun-version-file
      # reads `packageManager` (bun@1.3.14) so the runner stays in sync with the
      # lockfile and avoids drift. Action pin: commit 0c5077e = v2.2.0. Bump
      # intentionally; do not float to a tag.
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Single source of truth: the root `ci` script runs biome, oxlint,
      # typecheck, build, test coverage (100% thresholds), and knip. Keep the
      # check list in package.json, not here, to avoid drift.
      - name: Run CI checks
        run: bun run ci
