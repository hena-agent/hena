name: Run OpenCode review
description: Restore OpenCode auth.json from a secret, then run the OpenCode GitHub action to review a PR with a specific model and variant.

inputs:
  model:
    description: Provider/model id (e.g., anthropic/claude-opus-4-8, openai/gpt-5.5)
    required: true
  variant:
    description: Model variant for reasoning effort / thinking budget (e.g., max, xhigh)
    required: true
  opencode-auth-json:
    description: Contents of ~/.local/share/opencode/auth.json (pass via secrets)
    required: true
  github-token:
    description: Token used by the OpenCode action to post review comments
    required: true
  prompt:
    description: Full review prompt. The single source of truth lives in the caller workflow; this action does not provide a default to avoid drift.
    required: true

runs:
  using: composite
  steps:
    - name: Restore OpenCode auth.json
      shell: bash
      env:
        OPENCODE_AUTH_JSON: ${{ inputs.opencode-auth-json }}
      run: |
        set -euo pipefail
        if [ -z "${OPENCODE_AUTH_JSON}" ]; then
          echo "::error::OPENCODE_AUTH_JSON is empty. This typically happens for PRs from forks, where repo secrets are not exposed."
          exit 1
        fi
        install -d -m 700 "$HOME/.local/share/opencode"
        printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
        chmod 600 "$HOME/.local/share/opencode/auth.json"

    # Pin the opencode CLI version (distinct from the wrapper-action pin below).
    # The wrapper action installs opencode via https://opencode.ai/install, which
    # honors the VERSION env var; writing it to $GITHUB_ENV propagates the pin to
    # the wrapper's install step. Caveat: the wrapper caches keyed by
    # releases/latest, so a cache hit can skip the install -- safe here because
    # every opencode install in this repo flows through this pinned path.
    # Bump intentionally.
    - name: Pin opencode CLI version
      shell: bash
      run: echo "VERSION=1.17.4" >> "$GITHUB_ENV"

    # The review agent shells out to this repo's bun scripts (typecheck, test,
    # lint, etc.), but the ubuntu-latest runner has no bun preinstalled. Install
    # it here so bun is on PATH before the agent runs. bun-version-file reads the
    # `packageManager` field in package.json (bun@1.3.14) as the single source of
    # truth, keeping the runner in sync with the lockfile and avoiding drift.
    # Action pin: commit 0c5077e = v2.2.0. Bump intentionally; do not float to a tag.
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: package.json

    # Wrapper GitHub Action pin: commit 58a27b9 = v1.15.12. This is the ACTION
    # version, NOT the opencode CLI version pinned above (CLI = 1.17.4).
    # Bump intentionally; do not float to @latest or @dev.
    - name: Run OpenCode
      uses: anomalyco/opencode/github@58a27b95c155d3f7d9b9f25b30eb1233bfb0eae5
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        model: ${{ inputs.model }}
        variant: ${{ inputs.variant }}
        use_github_token: true
        prompt: ${{ inputs.prompt }}
