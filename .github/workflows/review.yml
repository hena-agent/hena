name: review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# A called (reusable) workflow cannot exceed the caller's token scopes, and this
# repo's default workflow permission is read-only. The reusable workflow needs
# pull-requests/issues write, so grant those scopes explicitly at the caller.
permissions:
  contents: read
  pull-requests: write
  issues: write

# A new push to a PR supersedes the previous commit, so cancel the in-flight
# run (CI gate + the expensive reviewer jobs) for that PR. github.ref is
# refs/pull/<n>/merge here, so this is scoped per-PR and never cancels another PR.
concurrency:
  group: review-${{ github.ref }}
  cancel-in-progress: true

# Same-repo PRs only (OPENCODE_AUTH_JSON is not exposed to fork PRs).
# Each reviewer runs via the shared _opencode-review.yml reusable workflow and
# posts under its own GitHub App identity:
#   gpt-review    -> hena-gpt-reviewer[bot]
#   claude-review -> hena-claude-reviewer[bot]
jobs:
  # Gate: lint, typecheck, build, coverage, and knip must all pass before any
  # reviewer runs. We run CI as a job here (rather than as a separate workflow
  # triggered via workflow_run) because the opencode CLI only supports
  # pull_request/issue events, so review.yml must stay on `pull_request`.
  ci:
    uses: ./.github/workflows/ci.yml

  gpt-review:
    needs: ci
    uses: ./.github/workflows/_opencode-review.yml
    with:
      model: openai/gpt-5.5
      variant: xhigh
      app-client-id: ${{ vars.GPT_REVIEWER_CLIENT_ID }}
      prompt: |
        Use the `thermo-nuclear-code-quality-review` skill to review it.
    secrets:
      app-private-key: ${{ secrets.GPT_REVIEWER_PRIVATE_KEY }}
      opencode-auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}

  claude-review:
    # Runs in parallel with gpt-review; both start once ci passes.
    needs: ci
    uses: ./.github/workflows/_opencode-review.yml
    with:
      model: anthropic/claude-opus-4-8
      variant: max
      app-client-id: ${{ vars.CLAUDE_REVIEWER_CLIENT_ID }}
      prompt: |
        Use the `thermo-nuclear-code-quality-review` skill to review it.
    secrets:
      app-private-key: ${{ secrets.CLAUDE_REVIEWER_PRIVATE_KEY }}
      opencode-auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
