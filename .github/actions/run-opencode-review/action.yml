name: Run OpenCode review
description: Restore OpenCode auth.json from a secret, install a pinned OpenCode CLI, and run a PR review with a specific model and variant.

inputs:
  model:
    description: Provider/model id (e.g., anthropic/claude-opus-4-8, openai/gpt-5.5)
    required: true
  variant:
    description: Model variant for reasoning effort / thinking budget (e.g., max, xhigh)
    required: true
  opencode-auth-json:
    description: Contents of ~/.local/share/opencode/auth.json (pass via secrets)
    required: true
  github-token:
    description: Token used by the OpenCode action to post review comments
    required: true
  prompt:
    description: Full review prompt. The single source of truth lives in the caller workflow; this action does not provide a default to avoid drift.
    required: true

runs:
  using: composite
  steps:
    - name: Restore OpenCode auth.json
      shell: bash
      env:
        OPENCODE_AUTH_JSON: ${{ inputs.opencode-auth-json }}
      run: |
        set -euo pipefail
        if [ -z "${OPENCODE_AUTH_JSON}" ]; then
          echo "::error::OPENCODE_AUTH_JSON is empty. This typically happens for PRs from forks, where repo secrets are not exposed."
          exit 1
        fi
        install -d -m 700 "$HOME/.local/share/opencode"
        printf '%s' "$OPENCODE_AUTH_JSON" > "$HOME/.local/share/opencode/auth.json"
        chmod 600 "$HOME/.local/share/opencode/auth.json"

    # We inline the install + run steps that the anomalyco/opencode/github
    # wrapper action used to provide. That action derives its cache key from an
    # UNAUTHENTICATED `curl https://api.github.com/repos/anomalyco/opencode/releases/latest`
    # run under `set -e -o pipefail`; on shared-IP GitHub runners that request is
    # intermittently rate-limited (HTTP 403), which aborts the job before the
    # action's own `${VERSION:-latest}` fallback can run. Pinning the version here
    # and keying the cache off it removes that flaky network dependency.
    #
    # OPENCODE_VERSION is the single source of truth for the cache key and the
    # install below. Bump intentionally; do not float to latest.
    - name: Pin opencode CLI version
      shell: bash
      run: echo "OPENCODE_VERSION=1.17.4" >> "$GITHUB_ENV"

    # The review agent shells out to this repo's bun scripts (typecheck, test,
    # lint, etc.), but the ubuntu-latest runner has no bun preinstalled. Install
    # it here so bun is on PATH before the agent runs. bun-version-file reads the
    # `packageManager` field in package.json (bun@1.3.14) as the single source of
    # truth, keeping the runner in sync with the lockfile and avoiding drift.
    # Action pin: commit 0c5077e = v2.2.0. Bump intentionally; do not float to a tag.
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: package.json

    - name: Cache opencode CLI
      id: cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ env.OPENCODE_VERSION }}

    # The opencode.ai install script honors the VERSION env var.
    - name: Install opencode CLI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ env.OPENCODE_VERSION }}
      run: curl -fsSL https://opencode.ai/install | bash

    - name: Add opencode to PATH
      shell: bash
      run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

    # Mirrors the wrapper action's env-driven entrypoint. use_github_token=true
    # makes opencode skip OIDC and use GITHUB_TOKEN for the GitHub API; provider
    # (model) auth comes from the auth.json restored above.
    - name: Run opencode review
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        VARIANT: ${{ inputs.variant }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: "true"
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: opencode github run
